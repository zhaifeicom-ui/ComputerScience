# Spring Boot Configuration
debug: true
spring:
  cloud:
    compatibility-verifier:
      enabled: false
    sentinel:
      transport:
        # 这里使用 docker-compose 里的服务名 sentinel
        dashboard: sentinel:8858
        # 客户端监控 API 端口，Docker 内部通信用
        port: 8719
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  cache:
    type: redis
  application:
    name: sales-platform
  datasource:
    url: jdbc:mysql://localhost:3306/sales_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      database: 1
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: ""

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    com.saas.sales: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO

jwt:
  secret: your-jwt-secret-key-change-this-in-production
  expiration: 86400000

ai:
  prediction:
    service:
      # 本地开发时调用的 Python 地址
      url: http://localhost:5000

inventory:
  check:
    future-days: 30
    scheduled:
      enabled: true
      cron: "0 0 2 * * ?"
    notification:
      enabled: false
      email:
        enabled: false
        recipients: []
      sms:
        enabled: false
        recipients: []